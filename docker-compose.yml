services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: petmatch-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - petmatch-network
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: petmatch-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - petmatch-network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: petmatch-postgres
    environment:
      POSTGRES_DB: petmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petmatch-network

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: petmatch-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petmatch.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - petmatch-network
    profiles:
      - tools

volumes:
  postgres_data:

networks:
  petmatch-network:
    driver: bridge
